<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta 
      name="viewport" 
      content="width=device-width, initial-scale=1.0" 
    />
    <title>Date Calculator</title>
    <meta name="description" content="Calculate dates by adding or subtracting days, or find the difference between two dates." />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
      *, *::before, *::after { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 48px 16px 64px;
        color: #1a1a1a;
      }

      .page {
        width: 100%;
        max-width: 520px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .page-title {
        text-align: center;
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: #1a1a1a;
      }

      .card {
        background: #fff;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
        border: 1px solid #ebebeb;
      }

      .card-label {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #999;
        margin-bottom: 18px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }

      label {
        font-size: 0.8125rem;
        font-weight: 500;
        color: #555;
      }

      .nl-wrap {
        position: relative;
      }

      .nl-input {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        font-size: 0.9375rem;
        font-family: inherit;
        color: #1a1a1a;
        background: #fafafa;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .nl-input:focus {
        border-color: #1a1a1a;
        box-shadow: 0 0 0 3px rgba(26,26,26,0.07);
        background: #fff;
      }

      .nl-input.is-valid { border-color: #2d7a3e; }
      .nl-input.is-invalid { border-color: #c0392b; }

      .nl-resolved {
        margin-top: 5px;
        font-size: 0.78rem;
        color: #2d7a3e;
        font-weight: 500;
        min-height: 1.1em;
        transition: opacity 0.15s;
      }

      .nl-resolved.error { color: #c0392b; }

      .nl-hint {
        margin-top: 6px;
        font-size: 0.72rem;
        color: #aaa;
        line-height: 1.5;
      }

      input[type="number"] {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        font-size: 0.9375rem;
        font-family: inherit;
        color: #1a1a1a;
        background: #fafafa;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
        -webkit-appearance: none;
        appearance: none;
      }

      input[type="number"]:focus {
        border-color: #1a1a1a;
        box-shadow: 0 0 0 3px rgba(26,26,26,0.07);
        background: #fff;
      }

      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button { opacity: 1; }

      .btn-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 20px;
      }

      .btn {
        padding: 11px 16px;
        border-radius: 10px;
        font-size: 0.875rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        border: none;
        transition: opacity 0.15s, transform 0.1s;
        letter-spacing: -0.01em;
      }
      .btn:active { transform: scale(0.97); }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; }

      .btn-add { background: #1a1a1a; color: #fff; }
      .btn-add:not(:disabled):hover { opacity: 0.85; }

      .btn-sub { background: #f0f0ee; color: #1a1a1a; border: 1.5px solid #e0e0e0; }
      .btn-sub:not(:disabled):hover { background: #e8e8e6; }

      .result-box {
        margin-top: 20px;
        padding: 16px 18px;
        border-radius: 10px;
        background: #f5f5f0;
        border: 1.5px solid #e8e8e4;
        animation: fadeIn 0.25s ease;
      }

      .result-label {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: #aaa;
        margin-bottom: 4px;
      }

      .result-date {
        font-size: 1.25rem;
        font-weight: 700;
        color: #1a1a1a;
        letter-spacing: -0.02em;
      }

      .result-sub {
        font-size: 0.8125rem;
        color: #888;
        margin-top: 3px;
      }

      .tag {
        display: inline-block;
        font-size: 0.6875rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 6px;
        margin-top: 8px;
      }
      .tag-add { background: #e6f4ea; color: #2d7a3e; }
      .tag-sub { background: #fdecea; color: #c0392b; }

      .diff-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .diff-result {
        margin-top: 20px;
        padding: 16px 18px;
        border-radius: 10px;
        background: #f5f5f0;
        border: 1.5px solid #e8e8e4;
        animation: fadeIn 0.25s ease;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .diff-number {
        font-size: 2rem;
        font-weight: 800;
        color: #1a1a1a;
        letter-spacing: -0.04em;
        line-height: 1;
      }

      .diff-text { font-size: 0.8125rem; color: #888; line-height: 1.4; }
      .diff-text strong {
        display: block;
        font-size: 0.9375rem;
        font-weight: 600;
        color: #1a1a1a;
        letter-spacing: -0.01em;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 400px) {
        .card { padding: 20px; }
        .diff-row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <p class="page-title">Date Between</p>

      <div class="card" x-data="dateDiff()">
        <p class="card-label">Days Between Two Dates</p>

        <div class="diff-row">
          <div class="field" style="margin-bottom:0">
            <label>Date A</label>
            <input
              class="nl-input"
              :class="{ 'is-valid': resolvedA, 'is-invalid': inputA && !resolvedA }"
              type="text"
              x-model="inputA"
              @input="parseA()"
              placeholder="today, Jan 1…"
              autocomplete="off" spellcheck="false"
            />
            <p class="nl-resolved" :class="{ error: inputA && !resolvedA }" x-text="feedbackA"></p>
          </div>
          <div class="field" style="margin-bottom:0">
            <label>Date B</label>
            <input
              class="nl-input"
              :class="{ 'is-valid': resolvedB, 'is-invalid': inputB && !resolvedB }"
              type="text"
              x-model="inputB"
              @input="parseB()"
              placeholder="next month, Dec 31…"
              autocomplete="off" spellcheck="false"
            />
            <p class="nl-resolved" :class="{ error: inputB && !resolvedB }" x-text="feedbackB"></p>
          </div>
        </div>

        <div class="diff-result" x-show="resolvedA && resolvedB" x-cloak>
          <p class="diff-number" x-text="absDiff"></p>
          <div class="diff-text">
            <strong x-text="absDiff === 1 ? '1 day apart' : absDiff + ' days apart'"></strong>
            <span x-text="diffLabel"></span>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ─── Natural language date parser ───────────────────────────────────────
      const WEEKDAYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
      const MONTHS   = [
        'january',
        'february',
        'march',
        'april',
        'may',
        'june',
        'july',
        'august',
        'september',
        'october',
        'november',
        'december'
      ];
      const MONTH_SHORT = MONTHS.map(m => m.slice(0, 3));

      function today() {
        const d = new Date(); d.setHours(0,0,0,0); return d;
      }

      function dateToISO(d) {
        return d.toISOString().split('T')[0];
      }

      function friendlyDate(d) {
        return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      }

      function parseNaturalDate(raw) {
        if (!raw || !raw.trim()) return null;
        const s = raw.trim().toLowerCase().replace(/,/g, '');

        // today / tomorrow / yesterday
        if (s === 'today' || s === 'now')     { return today(); }
        if (s === 'tomorrow')                 { const d = today(); d.setDate(d.getDate()+1); return d; }
        if (s === 'yesterday')                { const d = today(); d.setDate(d.getDate()-1); return d; }

        // next / last weekday — "next monday", "last friday"
        const nextDay = s.match(/^next\s+(\w+)$/);
        if (nextDay) {
          const wi = WEEKDAYS.indexOf(nextDay[1]);
          if (wi !== -1) {
            const d = today();
            const diff = ((wi - d.getDay() + 7) % 7) || 7;
            d.setDate(d.getDate() + diff);
            return d;
          }
        }
        const lastDay = s.match(/^last\s+(\w+)$/);
        if (lastDay) {
          const wi = WEEKDAYS.indexOf(lastDay[1]);
          if (wi !== -1) {
            const d = today();
            const diff = ((d.getDay() - wi + 7) % 7) || 7;
            d.setDate(d.getDate() - diff);
            return d;
          }
        }

        // bare weekday name — "monday", "friday" → the coming occurrence
        if (WEEKDAYS.includes(s)) {
          const wi = WEEKDAYS.indexOf(s);
          const d = today();
          const diff = ((wi - d.getDay() + 7) % 7) || 7;
          d.setDate(d.getDate() + diff);
          return d;
        }

        // "in X days/weeks/months" and "X days/weeks/months ago"
        const inM  = s.match(/^in\s+(\d+)\s+(day|days|week|weeks|month|months)$/);
        const agoM = s.match(/^(\d+)\s+(day|days|week|weeks|month|months)\s+ago$/);
        const rel  = inM || agoM;
        if (rel) {
          const n = parseInt(rel[1], 10);
          const unit = rel[2];
          const sign = inM ? 1 : -1;
          const d = today();
          if (unit.startsWith('day'))   d.setDate(d.getDate() + sign * n);
          if (unit.startsWith('week'))  d.setDate(d.getDate() + sign * n * 7);
          if (unit.startsWith('month')) d.setMonth(d.getMonth() + sign * n);
          return d;
        }

        // next/last week/month
        if (s === 'next week')  { const d = today(); d.setDate(d.getDate()+7);  return d; }
        if (s === 'last week')  { const d = today(); d.setDate(d.getDate()-7);  return d; }
        if (s === 'next month') { const d = today(); d.setMonth(d.getMonth()+1); return d; }
        if (s === 'last month') { const d = today(); d.setMonth(d.getMonth()-1); return d; }
        if (s === 'next year')  { const d = today(); d.setFullYear(d.getFullYear()+1); return d; }
        if (s === 'last year')  { const d = today(); d.setFullYear(d.getFullYear()-1); return d; }

        // "end of month" / "start of month"
        if (s === 'end of month') {
          const d = today(); d.setMonth(d.getMonth()+1, 0); return d;
        }
        if (s === 'start of month' || s === 'beginning of month') {
          const d = today(); d.setDate(1); return d;
        }

        // ISO: 2025-03-15
        if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)) {
          const d = new Date(s + 'T00:00:00');
          return isNaN(d) ? null : d;
        }

        // MM/DD/YYYY or MM/DD/YY or MM-DD-YYYY
        const mdy = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
        if (mdy) {
          let y = parseInt(mdy[3]); if (y < 100) y += 2000;
          const d = new Date(y, parseInt(mdy[1])-1, parseInt(mdy[2]));
          return isNaN(d) ? null : d;
        }

        // Month name formats: "Jan 5", "January 5", "Jan 5 2026", "5 Jan 2026"
        const moIdx = (tok) => {
          const t = tok.toLowerCase();
          const fi = MONTHS.findIndex(m => m === t || m.slice(0,3) === t);
          return fi; // -1 if not found
        };

        const toks = s.split(/\s+/);
        if (toks.length >= 2) {
          let mi = -1, day = null, year = null;
          // "Jan 5", "Jan 5 2026"
          mi = moIdx(toks[0]);
          if (mi !== -1 && /^\d{1,2}$/.test(toks[1])) {
            day = parseInt(toks[1]);
            year = toks[2] ? parseInt(toks[2]) : today().getFullYear();
            const d = new Date(year, mi, day);
            return isNaN(d) ? null : d;
          }
          // "5 Jan 2026" or "5 Jan"
          mi = moIdx(toks[1]);
          if (mi !== -1 && /^\d{1,2}$/.test(toks[0])) {
            day = parseInt(toks[0]);
            year = toks[2] ? parseInt(toks[2]) : today().getFullYear();
            const d = new Date(year, mi, day);
            return isNaN(d) ? null : d;
          }
        }

        // Single number: treat as day of this month
        if (/^\d{1,2}$/.test(s)) {
          const d = today();
          d.setDate(parseInt(s));
          return isNaN(d.getTime()) ? null : d;
        }

        return null;
      }

      // ─── Alpine component: Add / Subtract ───────────────────────────────────
      function dateCalc() {
        return {
          nlInput: 'today',
          days: 7,
          resolvedDate: null,
          nlFeedback: '',
          result: null,
          operation: null,
          init() { this.parseNL(); },
          parseNL() {
            const d = parseNaturalDate(this.nlInput);
            this.resolvedDate = d;
            this.nlFeedback = d
              ? '→ ' + friendlyDate(d)
              : (this.nlInput ? 'Can\'t parse — try "tomorrow" or "2025-06-01"' : '');
          },
          get canCalc() {
            return this.resolvedDate && this.days !== '' && Number(this.days) > 0;
          },
          calc(op) {
            if (!this.canCalc) return;
            const base = new Date(this.resolvedDate);
            const offset = op === 'add' ? Number(this.days) : -Number(this.days);
            base.setDate(base.getDate() + offset);
            this.result = base;
            this.operation = op;
          },
          get resultFormatted() { return this.result ? friendlyDate(this.result) : ''; },
          get isoResult() { return this.result ? dateToISO(this.result) : ''; }
        };
      }

      // ─── Alpine component: Difference ───────────────────────────────────────
      function dateDiff() {
        return {
          inputA: 'today',
          inputB: 'in 30 days',
          resolvedA: null,
          resolvedB: null,
          feedbackA: '',
          feedbackB: '',
          init() { this.parseA(); this.parseB(); },
          parseA() {
            const d = parseNaturalDate(this.inputA);
            this.resolvedA = d;
            this.feedbackA = d ? '→ ' + friendlyDate(d) : (this.inputA ? 'Can\'t parse' : '');
          },
          parseB() {
            const d = parseNaturalDate(this.inputB);
            this.resolvedB = d;
            this.feedbackB = d ? '→ ' + friendlyDate(d) : (this.inputB ? 'Can\'t parse' : '');
          },
          get diff() {
            if (!this.resolvedA || !this.resolvedB) return null;
            return Math.round((this.resolvedB - this.resolvedA) / 86400000);
          },
          get absDiff() { return Math.abs(this.diff); },
          get diffLabel() {
            const d = this.diff;
            if (d === null) return '';
            if (d === 0) return 'Same day';
            return d > 0 ? 'Date B is after Date A' : 'Date B is before Date A';
          }
        };
      }
    </script>
  </body>
</html>
