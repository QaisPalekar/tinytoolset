<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Days Between Calculator — Find the Difference Between Two Dates</title>
  <meta name="description"
    content="Calculate the exact number of days between any two dates using natural language. Type 'today', 'next Friday', or any date format." />
  <meta property="og:title" content="Days Between Calculator" />
  <meta property="og:description"
    content="Find the exact number of days between any two dates using natural language input." />
  <meta property="og:type" content="website" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface-alt: #f9f8f5;
      --border: #e2dfd8;
      --primary: #1a3a5c;
      --primary-light: #2a5080;
      --accent: #e8613a;
      --accent-light: #f5845e;
      --text: #1c2b3a;
      --text-muted: #6b7a8a;
      --text-light: #9aa6b0;
      --success: #2d7a4f;
      --radius: 12px;
      --radius-lg: 20px;
      --shadow: 0 4px 24px rgba(26, 58, 92, 0.08);
      --shadow-lg: 0 8px 40px rgba(26, 58, 92, 0.14);
      --font-serif: 'Georgia', 'Times New Roman', serif;
      --font: system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      max-width: 540px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 1rem;
    }

    .header h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: normal;
      color: var(--primary);
      line-height: 1.2;
      margin-bottom: 0.6rem;
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* Card */
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 520px;
      padding: 2rem;
    }

    /* Input group */
    .field {
      margin-bottom: 1.75rem;
    }

    .field label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.8rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      background: var(--surface-alt);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: var(--font);
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26, 58, 92, 0.1);
    }

    input[type="text"].is-valid {
      border-color: var(--success);
    }

    input[type="text"].is-invalid {
      border-color: var(--accent);
    }

    .resolved-feedback {
      margin-top: 5px;
      font-size: 0.76rem;
      color: var(--success);
      font-weight: 500;
      min-height: 1.1em;
      transition: opacity 0.15s;
    }

    .resolved-feedback.error {
      color: var(--accent);
    }

    .hint {
      margin-top: 0.5rem;
      font-size: 0.74rem;
      color: var(--text-light);
      line-height: 1.5;
    }

    .hint em {
      font-style: normal;
      color: var(--text-muted);
    }

    /* Results */
    .results {
      width: 100%;
      max-width: 520px;
      margin-top: 1.5rem;
    }

    .results-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      padding-left: 4px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.6rem 1.8rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .result-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .result-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(135deg, #3a5cc2, #6b8bef);
      border-radius: 4px 0 0 4px;
    }

    .result-big-number {
      font-family: var(--font-serif);
      font-size: 2.8rem;
      font-weight: normal;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .result-big-label {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .result-sub-label {
      font-size: 0.84rem;
      color: var(--text-muted);
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.4rem 0;
      border-bottom: 1px dashed var(--border);
    }

    .result-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .result-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .result-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .result-value.highlight {
      font-size: 1.25rem;
      color: var(--primary);
    }

    /* Disclaimer */
    .disclaimer {
      max-width: 520px;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-light);
      text-align: center;
      line-height: 1.6;
    }

    /* Animation */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      animation: slideUp 0.35s ease both;
    }

    .delay-1 {
      animation-delay: 0.05s;
    }

    .delay-2 {
      animation-delay: 0.12s;
    }

    @media (max-width: 420px) {
      .card {
        padding: 1.5rem;
      }

      .date-row {
        grid-template-columns: 1fr;
      }

      .result-card {
        padding: 1.1rem 1.2rem;
      }
    }
  </style>
</head>

<body x-data="dateDiff()">

  <div class="header animate-in">
    <div class="header-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z" />
      </svg>
      Days Between Calculator
    </div>
  </div>

  <div class="card animate-in delay-1">
    <div class="date-row">
      <div class="field" style="margin-bottom: 0">
        <label>Date A</label>
        <input class="date-input" :class="{ 'is-valid': resolvedA, 'is-invalid': inputA && !resolvedA }" type="text"
          x-model="inputA" @input="parseA()" placeholder="today, Jan 1…" autocomplete="off" spellcheck="false" />
        <p class="resolved-feedback" :class="{ error: inputA && !resolvedA }" x-text="feedbackA"></p>
      </div>
      <div class="field" style="margin-bottom: 0">
        <label>Date B</label>
        <input class="date-input" :class="{ 'is-valid': resolvedB, 'is-invalid': inputB && !resolvedB }" type="text"
          x-model="inputB" @input="parseB()" placeholder="next month, Dec 31…" autocomplete="off"
          spellcheck="false" />
        <p class="resolved-feedback" :class="{ error: inputB && !resolvedB }" x-text="feedbackB"></p>
      </div>
    </div>
    <p class="hint">Try: <em>today · tomorrow · next Friday · in 10 days · 3 weeks ago · Jan 5 · 2026-06-01</em></p>
  </div>

  <!-- Results -->
  <template x-if="resolvedA && resolvedB">
    <div class="results animate-in delay-2">
      <div class="results-title">Result</div>
      <div class="result-card">
        <div class="result-big-number" x-text="absDiff"></div>
        <div class="result-big-label" x-text="absDiff === 1 ? '1 day apart' : absDiff + ' days apart'"></div>
        <div class="result-sub-label" x-text="diffLabel"></div>

        <div style="margin-top: 1rem;">
          <div class="result-row">
            <span class="result-label">Date A</span>
            <span class="result-value" x-text="friendlyA"></span>
          </div>
          <div class="result-row">
            <span class="result-label">Date B</span>
            <span class="result-value" x-text="friendlyB"></span>
          </div>
          <div class="result-row">
            <span class="result-label">Weeks & Days</span>
            <span class="result-value highlight" x-text="weeksAndDays"></span>
          </div>
        </div>
      </div>
    </div>
  </template>

  <p class="disclaimer">
    * Dates are parsed using natural language. All calculations are based on calendar days.
  </p>

  <script>
    // ─── Natural language date parser ───────────────────────────────────────
    const WEEKDAYS = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
    const MONTHS = [
      'january', 'february', 'march', 'april', 'may', 'june',
      'july', 'august', 'september', 'october', 'november', 'december'
    ];
    const MONTH_SHORT = MONTHS.map(m => m.slice(0, 3));

    function today() {
      const d = new Date(); d.setHours(0, 0, 0, 0); return d;
    }

    function dateToISO(d) {
      return d.toISOString().split('T')[0];
    }

    function friendlyDate(d) {
      return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }

    function shortDate(d) {
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function parseNaturalDate(raw) {
      if (!raw || !raw.trim()) return null;
      const s = raw.trim().toLowerCase().replace(/,/g, '');

      if (s === 'today' || s === 'now') { return today(); }
      if (s === 'tomorrow') { const d = today(); d.setDate(d.getDate() + 1); return d; }
      if (s === 'yesterday') { const d = today(); d.setDate(d.getDate() - 1); return d; }

      const nextDay = s.match(/^next\s+(\w+)$/);
      if (nextDay) {
        const wi = WEEKDAYS.indexOf(nextDay[1]);
        if (wi !== -1) {
          const d = today();
          const diff = ((wi - d.getDay() + 7) % 7) || 7;
          d.setDate(d.getDate() + diff);
          return d;
        }
      }
      const lastDay = s.match(/^last\s+(\w+)$/);
      if (lastDay) {
        const wi = WEEKDAYS.indexOf(lastDay[1]);
        if (wi !== -1) {
          const d = today();
          const diff = ((d.getDay() - wi + 7) % 7) || 7;
          d.setDate(d.getDate() - diff);
          return d;
        }
      }

      if (WEEKDAYS.includes(s)) {
        const wi = WEEKDAYS.indexOf(s);
        const d = today();
        const diff = ((wi - d.getDay() + 7) % 7) || 7;
        d.setDate(d.getDate() + diff);
        return d;
      }

      const inM = s.match(/^in\s+(\d+)\s+(day|days|week|weeks|month|months)$/);
      const agoM = s.match(/^(\d+)\s+(day|days|week|weeks|month|months)\s+ago$/);
      const rel = inM || agoM;
      if (rel) {
        const n = parseInt(rel[1], 10);
        const unit = rel[2];
        const sign = inM ? 1 : -1;
        const d = today();
        if (unit.startsWith('day')) d.setDate(d.getDate() + sign * n);
        if (unit.startsWith('week')) d.setDate(d.getDate() + sign * n * 7);
        if (unit.startsWith('month')) d.setMonth(d.getMonth() + sign * n);
        return d;
      }

      if (s === 'next week') { const d = today(); d.setDate(d.getDate() + 7); return d; }
      if (s === 'last week') { const d = today(); d.setDate(d.getDate() - 7); return d; }
      if (s === 'next month') { const d = today(); d.setMonth(d.getMonth() + 1); return d; }
      if (s === 'last month') { const d = today(); d.setMonth(d.getMonth() - 1); return d; }
      if (s === 'next year') { const d = today(); d.setFullYear(d.getFullYear() + 1); return d; }
      if (s === 'last year') { const d = today(); d.setFullYear(d.getFullYear() - 1); return d; }

      if (s === 'end of month') {
        const d = today(); d.setMonth(d.getMonth() + 1, 0); return d;
      }
      if (s === 'start of month' || s === 'beginning of month') {
        const d = today(); d.setDate(1); return d;
      }

      if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)) {
        const d = new Date(s + 'T00:00:00');
        return isNaN(d) ? null : d;
      }

      const mdy = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
      if (mdy) {
        let y = parseInt(mdy[3]); if (y < 100) y += 2000;
        const d = new Date(y, parseInt(mdy[1]) - 1, parseInt(mdy[2]));
        return isNaN(d) ? null : d;
      }

      const moIdx = (tok) => {
        const t = tok.toLowerCase();
        const fi = MONTHS.findIndex(m => m === t || m.slice(0, 3) === t);
        return fi;
      };

      const toks = s.split(/\s+/);
      if (toks.length >= 2) {
        let mi = -1, day = null, year = null;
        mi = moIdx(toks[0]);
        if (mi !== -1 && /^\d{1,2}$/.test(toks[1])) {
          day = parseInt(toks[1]);
          year = toks[2] ? parseInt(toks[2]) : today().getFullYear();
          const d = new Date(year, mi, day);
          return isNaN(d) ? null : d;
        }
        mi = moIdx(toks[1]);
        if (mi !== -1 && /^\d{1,2}$/.test(toks[0])) {
          day = parseInt(toks[0]);
          year = toks[2] ? parseInt(toks[2]) : today().getFullYear();
          const d = new Date(year, mi, day);
          return isNaN(d) ? null : d;
        }
      }

      if (/^\d{1,2}$/.test(s)) {
        const d = today();
        d.setDate(parseInt(s));
        return isNaN(d.getTime()) ? null : d;
      }

      return null;
    }

    // ─── Alpine component: Difference ───────────────────────────────────────
    function dateDiff() {
      return {
        inputA: 'today',
        inputB: 'in 30 days',
        resolvedA: null,
        resolvedB: null,
        feedbackA: '',
        feedbackB: '',
        init() { this.parseA(); this.parseB(); },
        parseA() {
          const d = parseNaturalDate(this.inputA);
          this.resolvedA = d;
          this.feedbackA = d ? '→ ' + friendlyDate(d) : (this.inputA ? 'Can\'t parse' : '');
        },
        parseB() {
          const d = parseNaturalDate(this.inputB);
          this.resolvedB = d;
          this.feedbackB = d ? '→ ' + friendlyDate(d) : (this.inputB ? 'Can\'t parse' : '');
        },
        get diff() {
          if (!this.resolvedA || !this.resolvedB) return null;
          return Math.round((this.resolvedB - this.resolvedA) / 86400000);
        },
        get absDiff() { return Math.abs(this.diff); },
        get diffLabel() {
          const d = this.diff;
          if (d === null) return '';
          if (d === 0) return 'Same day';
          return d > 0 ? 'Date B is after Date A' : 'Date B is before Date A';
        },
        get friendlyA() {
          return this.resolvedA ? shortDate(this.resolvedA) : '';
        },
        get friendlyB() {
          return this.resolvedB ? shortDate(this.resolvedB) : '';
        },
        get weeksAndDays() {
          const total = this.absDiff;
          const weeks = Math.floor(total / 7);
          const days = total % 7;
          if (weeks === 0) return days + (days === 1 ? ' day' : ' days');
          if (days === 0) return weeks + (weeks === 1 ? ' week' : ' weeks');
          return weeks + (weeks === 1 ? ' week' : ' weeks') + ', ' + days + (days === 1 ? ' day' : ' days');
        }
      };
    }
  </script>

</body>

</html>
